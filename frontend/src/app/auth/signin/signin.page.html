<section class="auth-page">
  <section class="auth-card" aria-labelledby="signin-title">
    <h2 id="signin-title" class="auth-title">Sign in</h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="auth-form signin-form"
      novalidate
    >
      <div class="field">
        <label appLabel for="email">Email</label>
        <input
          id="email"
          appInput
          type="email"
          autocomplete="email"
          formControlName="email"
          [attr.aria-invalid]="fieldError('email') ? true : null"
          [attr.aria-describedby]="fieldError('email') ? 'email-error' : null"
        />
        @if (fieldError('email'); as error) {
          <p id="email-error" class="field-error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label appLabel for="password">Password</label>
        <app-password-input
          inputId="password"
          autocomplete="current-password"
          formControlName="password"
          [ariaInvalid]="fieldError('password') ? true : null"
          [ariaDescribedby]="fieldError('password') ? 'password-error' : null"
        />
        @if (fieldError('password'); as error) {
          <p id="password-error" class="field-error">{{ error }}</p>
        }
      </div>

      @if (serverError(); as error) {
        <p class="form-error">{{ error }}</p>
      }

      <button appButton type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-switch">
      New here?
      <a routerLink="/signup">Create an account</a>
    </p>
  </section>
</section>
