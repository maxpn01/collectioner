<section class="auth-page">
  <section class="auth-card" aria-labelledby="signup-title">
    <h2 id="signup-title" class="auth-title">Create account</h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="auth-form signup-form"
      novalidate
    >
      <div class="field">
        <label appLabel for="email">Email</label>
        <input
          id="email"
          appInput
          type="email"
          autocomplete="email"
          formControlName="email"
          [attr.aria-invalid]="fieldError('email') ? true : null"
          [attr.aria-describedby]="fieldError('email') ? 'email-error' : null"
        />
        @if (fieldError('email'); as error) {
          <p id="email-error" class="field-error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label appLabel for="username">Username</label>
        <input
          id="username"
          appInput
          type="text"
          autocomplete="username"
          formControlName="username"
          [attr.aria-invalid]="fieldError('username') ? true : null"
          [attr.aria-describedby]="fieldError('username') ? 'username-error' : null"
        />
        @if (fieldError('username'); as error) {
          <p id="username-error" class="field-error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label appLabel for="password">Password</label>
        <app-password-input
          inputId="password"
          autocomplete="new-password"
          formControlName="password"
          [ariaInvalid]="fieldError('password') ? true : null"
          [ariaDescribedby]="fieldError('password') ? 'password-error' : null"
        />
        @if (fieldError('password'); as error) {
          <p id="password-error" class="field-error">{{ error }}</p>
        }
      </div>

      @if (serverError(); as error) {
        <p class="form-error">{{ error }}</p>
      }

      <button appButton type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/signin">Sign in</a>
    </p>
  </section>
</section>
